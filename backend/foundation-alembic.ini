# =============================================================================
# Careerkundi — Foundation Alembic configuration (0050-PF1-S1R1A)
# New CareerKundi schema authority. Legacy history remains in alembic.ini /
# app/db/migrations/ (frozen). URL comes from settings or a shared connection
# supplied by app.db.migration_runner (cfg.attributes["connection"]).
# =============================================================================
[alembic]
script_location = app/db/foundation_migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
# Ownership table for the new foundation lineage (not legacy alembic_version).
version_table = careerkundi_foundation_version
version_table_schema = public

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
