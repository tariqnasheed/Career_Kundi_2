# =============================================================================
# Careerkundi — Alembic configuration
# The actual database URL is injected at runtime by db/migrations/env.py from
# app.core.config.settings (DATABASE_URL_SYNC), NOT hardcoded here, so the
# same migration scripts work identically in dev, CI, and production.
# =============================================================================
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
