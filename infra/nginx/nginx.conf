# =============================================================================
# Careerkundi — Top-level nginx reverse proxy (production gateway)
# Routes /api/* and /health to the backend container; everything else to
# the frontend SPA container. This is the single public entry point on :80
# (and :443 once a TLS certificate is mounted — see README "Deployment").
# =============================================================================
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json;

    # Security headers applied to every response proxied through this gateway.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com;" always;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    server {
        listen 80;
        server_name careerkundi.com www.careerkundi.com;

        # --- Uncomment once a certificate is mounted to enable HTTPS redirect ---
        # return 301 https://$host$request_uri;

        location /api/ {
            # Forward requests to the backend container.
            # IMPORTANT: No trailing slash on proxy_pass! A trailing slash
            # causes nginx to strip the matched prefix (/api/) from the URI.
            # Without the trailing slash, /api/v1/auth/login arrives at the
            # backend exactly as /api/v1/auth/login (which is what FastAPI expects).
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Streaming endpoints (interview pack generation, chat) need
            # buffering disabled so tokens flush to the client immediately.
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location /health {
            proxy_pass http://backend_upstream/health;
        }

        location / {
            proxy_pass http://frontend_upstream/;
        }
    }

    # --- HTTPS server template (enable once cert files exist at the paths below) ---
    # server {
    #     listen 443 ssl;
    #     server_name careerkundi.com www.careerkundi.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.3 TLSv1.2;
    #     location /api/ { proxy_pass http://backend_upstream/; }
    #     location /      { proxy_pass http://frontend_upstream/; }
    # }
}
