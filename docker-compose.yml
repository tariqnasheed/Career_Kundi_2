# =============================================================================
# Careerkundi — Docker Compose (production-shaped local stack)
# Run `docker compose up --build` to start EVERYTHING: frontend, backend,
# Postgres, Redis, and nginx reverse proxy. No manual steps required beyond
# copying .env.example -> .env and filling in API keys (optional — the
# platform runs fully on mock providers without them).
# =============================================================================
name: careerkundi

services:
  # ---------------------------------------------------------------------------
  # Postgres — primary relational store for users, profiles, jobs, CVs,
  # roadmaps, chat history, and audit logs.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: careerkundi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careerkundi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerkundi}
      POSTGRES_DB: ${POSTGRES_DB:-careerkundi}
    volumes:
      - pgdata:/var/lib/postgresql/data   # Named volume so data survives `docker compose down`
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerkundi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis — prompt/result cache, rate-limit counters, session + pub/sub bus.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: careerkundi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Backend — FastAPI + LangGraph. Dockerfile CMD runs foundation
  # `python -m app.db.migration_runner` (fail-closed on legacy unowned DBs),
  # then uvicorn. Mounts the FAISS index + knowledge graph as a volume
  # so RAG/GraphRAG data persists across restarts.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerkundi-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-careerkundi}:${POSTGRES_PASSWORD:-careerkundi}@db:5432/${POSTGRES_DB:-careerkundi}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-careerkundi}:${POSTGRES_PASSWORD:-careerkundi}@db:5432/${POSTGRES_DB:-careerkundi}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - vector_store:/app/data         # Persisted FAISS index + knowledge graph
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite SPA, served via nginx in production-shaped builds.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: careerkundi-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy that terminates TLS in production and routes
  # /api/* to the backend, everything else to the frontend SPA.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: careerkundi-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:           # Postgres data directory
  vector_store:      # FAISS index + networkx knowledge graph pickle
