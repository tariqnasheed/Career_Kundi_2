# =============================================================================
# Careerkundi — Continuous Integration
# Runs on every push and PR: lints + tests the backend and frontend
# independently, then verifies the Docker images actually build. This is a
# template — adjust secrets/branch protection rules to your org's needs.
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .
      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy app || true   # non-blocking until full typing pass lands
      - name: Run tests with coverage
        working-directory: backend
        run: uv run pytest --cov=app --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run
      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t careerkundi-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t careerkundi-frontend:ci ./frontend --build-arg VITE_API_BASE_URL=http://localhost:8000
